<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rings</title>
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; overflow:hidden; background:transparent; }
    canvas { display:block; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
// Leggi i colori dall'URL (?c=["#hex1","#hex2",...])
var colors = ['#912B3D', '#2B917F', '#DBB971'];
try {
  var params = new URLSearchParams(window.location.search);
  var c = params.get('c');
  if (c) {
    var parsed = JSON.parse(decodeURIComponent(c));
    if (Array.isArray(parsed) && parsed.length > 0) {
      colors = parsed;
    }
  }
} catch(e) {}

function shuffle(array) {
  var a = array.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}
colors = shuffle(colors);

var rings = [];
var count = 20;

function setup() {
  var cnv = createCanvas(windowWidth, windowHeight);
  cnv.style('background', 'transparent');

  var diameterbase = 0.1;
  for (var i = 0; i < count; i++) {
    var diameter = diameterbase + (0.85 * i) / count;
    var arcLength = random(PI * 0.2, PI * 2);
    var arcAngle  = random(-PI * 2, PI * 2);
    var spinSpeed = random(-1, 1);
    rings.push({ spinSpeed, diameter, arcLength, arcAngle });
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function draw() {
  clear();
  noFill();
  var minDim = min(width, height);
  strokeWeight(minDim * 0.012);
  strokeCap(ROUND);
  var d = minDim * 0.75;

  for (var i = 0; i < rings.length; i++) {
    var r = rings[i];
    var spin = millis() / 1000 * r.spinSpeed;
    stroke(ReturnColor(i));
    arc(
      width / 2, height / 2,
      r.diameter * d, r.diameter * d,
      spin + r.arcAngle,
      spin + r.arcAngle + PI * r.arcLength
    );
  }
}

function ReturnColor(i) {
  return colors[i % colors.length];
}
</script>
</body>
</html>
