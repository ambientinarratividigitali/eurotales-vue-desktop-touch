<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <!--
      Forza il browser a usare i pixel fisici reali (1920px)
      invece di quelli CSS scalati per il DPR.
      width=1920 + initial-scale=1 dice al browser:
      "la viewport è esattamente 1920px, non scalare".
    -->
    <meta name="viewport" content="width=1920, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#912B3D" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/img/logoEurotales.png" />
    <title>Timeline — Eurotales</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
